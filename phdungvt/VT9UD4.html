    function startQuiz() {
        const name = dom.nameInput.value.trim();
        const className = dom.classInput.value.trim();
        if (!name || !className) {
            alert('Vui lĂ²ng nháº­p Ä‘áº§y Ä‘á»§ Há» tĂªn vĂ  Lớp!');
            return;
        }
        
        // --- SHUFFLE ---
        const partMap = { 'multiple-choice': 'part1', 'true-false': 'part2', 'short-answer': 'part3', 'essay': 'part4' };
        const groups = { 'multiple-choice': [], 'true-false': [], 'short-answer': [], 'essay': [] };
        
        quizData.forEach(q => {
            const type = mapEnglishTypeToSchemaType(q.type);
            if (groups[type]) groups[type].push(q);
        });
        
        let shuffledQuizData = [];
        for (const [type, questions] of Object.entries(groups)) {
            const partKey = partMap[type];
            const setting = options.shuffleSettings[partKey];
            
            if (setting === 'both' || setting === 'questions') {
                shuffleArray(questions);
            }
            
            questions.forEach(q => {
                if ((setting === 'both' || setting === 'answers') && (type === 'multiple-choice')) {
                    if (q.rendered_options) {
                        let optionsWithIndex = q.rendered_options.map((opt, i) => ({ opt, isCorrect: (i === q.correctAnswerIndex) }));
                        optionsWithIndex = shuffleArray(optionsWithIndex);
                        q.rendered_options = optionsWithIndex.map(o => o.opt);
                        q.correctAnswerIndex = optionsWithIndex.findIndex(o => o.isCorrect);
                    }
                }
            });
            shuffledQuizData = shuffledQuizData.concat(questions);
        }
        quizData = shuffledQuizData;
        // --- END SHUFFLE ---

        // NEW: Get Student API Key if provided
        if (dom.studentApiKeyInput && dom.studentApiKeyInput.value.trim()) {
            apiKeys.gemini = dom.studentApiKeyInput.value.trim();
        }

        dom.studentNameDisplay.textContent = name;
        dom.welcomeScreen.classList.add('hidden');
        dom.quizScreen.classList.remove('hidden');
        
        renderQuestions();
        renderNav();
        updateProgress();
        
        if (options.timeLimit > 0) {
            startTimer();
        } else {
            dom.timerDisplay.textContent = "--:--";
        }
        
        // Setup intersection observer to update current question index on scroll
        setupScrollObserver();
        
        window.scrollTo(0, 0);
    }

    function setupScrollObserver() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const id = entry.target.id; // q-0, q-1...
                    const idx = parseInt(id.split('-')[1]);
                    currentQuestionIndex = idx;
                    updateMobileControls();
                    updateProgress();
                }
            });
        }, { threshold: 0.5 });
        
        quizData.forEach((_, idx) => {
            const el = document.getElementById(`q-${idx}`);
            if(el) observer.observe(el);
        });
    }

    // --- LOGIC CHáº¤M ÄIá»‚M THĂ”NG MINH ---
    function normalizeMathString(str) {
        if (!str) return '';
        let s = str.toString().toLowerCase().trim();
        // Replace decimal comma
        s = s.replace(/,(\d)/g, '.$1');
        // Remove spaces
        s = s.split(' ').join('');
        // Remove basic latex symbols commonly used for grouping
        s = s.split('\\left').join(''); 
        s = s.split('\\right').join('');
        s = s.split('{').join('');
        s = s.split('}').join('');
        s = s.split('$').join('');
        // Remove *
        s = s.split('*').join('');
        s = s.split(':').join('/');
        return s;
    }

    function checkAnswerSmart(userVal, correctVal) {
        if (!correctVal) return false;
        if (!userVal) return false;

        // CĂ¡ch 1: So sĂ¡nh chĂ­nh xĂ¡c (sau khi trim)
        if (userVal.trim().toLowerCase() === correctVal.trim().toLowerCase()) return true;

        // CĂ¡ch 2: So sĂ¡nh thĂ´ng minh dáº¡ng ToĂ¡n há»c (xĂ³a khoáº£ng tráº¯ng, latex)
        const cleanUser = normalizeMathString(userVal);
        const cleanCorrect = normalizeMathString(correctVal);
        if (cleanUser === cleanCorrect && cleanUser !== '') return true;

        // CĂ¡ch 3: So sĂ¡nh sá»‘ há»c (náº¿u cáº£ 2 lĂ  sá»‘)
        const numUser = parseFloat(userVal.replace(',', '.'));
        const numCorrect = parseFloat(correctVal.replace(',', '.'));
        if (!isNaN(numUser) && !isNaN(numCorrect)) {
            // Cháº¥p nháº­n sai sá»‘ nhá»
            return Math.abs(numUser - numCorrect) < 0.0001; 
        }

        return false;
    }

    // --- Helper Ä‘á»ƒ láº¥y Ä‘iá»ƒm tá»‘i Ä‘a cá»§a cĂ¢u há»i tá»« ná»™i dung ---
    function getQuestionMaxScore(questionText, defaultScore) {
        // TĂ¬m cĂ¡c máº«u nhÆ° (2 Ä‘iá»ƒm), [2Ä‘], (2.5Ä‘), [1.5 Ä‘iá»ƒm] á»Ÿ Ä‘áº§u hoáº·c cuá»‘i cĂ¢u
        const regex = /[([]s*(d+([.,]d+)?)s*(Ä‘|Ä‘iá»ƒm)s*[)]]/i;
        const match = questionText.match(regex);
        if (match) {
            return parseFloat(match[1].replace(',', '.'));
        }
        return defaultScore;
    }

    async function submitQuiz(autoSubmit = false) {
        if (isSubmitted) return;
        isSubmitted = true;
        clearInterval(timerInterval);
        
        const loadingOverlay = document.createElement('div');
        loadingOverlay.className = "fixed inset-0 bg-white bg-opacity-90 z-50 flex flex-col items-center justify-center";
        loadingOverlay.innerHTML = `<svg class="animate-spin h-12 w-12 text-indigo-600 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg><p class="text-lg font-semibold text-gray-700">Äang cháº¥m Ä‘iá»ƒm vĂ  phĂ¢n tĂ­ch bĂ i lĂ m...</p>`;
        document.body.appendChild(loadingOverlay);

        try {
            // 1. TĂ­nh toĂ¡n trá»ng sá»‘ Ä‘iá»ƒm cho tá»«ng pháº§n (Dá»±a trĂªn cáº¥u hĂ¬nh lĂºc xuáº¥t Ä‘á»)
            let countMC = 0, countTF = 0, countSA = 0, countEssay = 0;
            quizData.forEach(q => {
                const type = q.type;
                if (type === 'multiple-choice' || type.startsWith('mc-')) countMC++;
                else if (type === 'true-false' || type.startsWith('tf-')) countTF++;
                else if (type === 'short-answer' || type.startsWith('sentence-')) countSA++;
                else countEssay++;
            });

            const scorePerMC = countMC > 0 ? (options.pointsMC || 0) / countMC : 0;
            const scorePerTF = countTF > 0 ? (options.pointsTF || 0) / countTF : 0;
            const scorePerSA = countSA > 0 ? (options.pointsSA || 0) / countSA : 0;
            const scorePerEssayAvg = countEssay > 0 ? (options.pointsEssay || 0) / countEssay : 0;

            let totalScore = 0;
            let detailResults = [];
            
            // Prepare promises for AI grading if needed
            const gradingPromises = quizData.map(async (item, index) => {
                let isCorrect = false;
                let detail = {};
                let scoreEarned = 0;
                let aiGradingResult = null;

                try {
                    // --- Xá»¬ LĂ TRáº®C NGHIá»†M (Multiple Choice) ---
                    if (item.type === 'multiple-choice' || item.type.startsWith('mc-')) {
                        // Priority: Individual score > Group average score
                        let maxPoint = item.score > 0 ? item.score : scorePerMC;
                        if (userAnswers[index] === item.correctAnswerIndex) {
                            isCorrect = true;
                            scoreEarned = maxPoint;
                        }
                        detail = { userAnswer: userAnswers[index], correctAnswer: item.correctAnswerIndex };
                    } 
                    
                    // --- Xá»¬ LĂ ÄĂNG/SAI (True/False) ---
                    else if (item.type === 'true-false' || item.type.startsWith('tf-')) {
                        let correctStmtCount = 0;
                        let stmtResults = [];
                        // Priority: Individual score > Group average score
                        let maxPoint = item.score > 0 ? item.score : scorePerTF;

                        item.statements.forEach((stmt, i) => {
                            const userVal = userAnswers[index] ? userAnswers[index][i] : null;
                            const stmtCorrect = (String(userVal) === String(stmt.is_correct)); 
                            if (stmtCorrect) correctStmtCount++;
                            stmtResults.push({ statement: i, user: userVal, correct: stmt.is_correct, isCorrect: stmtCorrect });
                        });

                        if (options.pointsTFMethod === 'even') {
                            scoreEarned = (correctStmtCount / 4) * maxPoint;
                            if (correctStmtCount === 4) isCorrect = true;
                        } else {
                            if (correctStmtCount === 1) scoreEarned = maxPoint * 0.1;
                            else if (correctStmtCount === 2) scoreEarned = maxPoint * 0.25;
                            else if (correctStmtCount === 3) scoreEarned = maxPoint * 0.5;
                            else if (correctStmtCount === 4) { scoreEarned = maxPoint; isCorrect = true; }
                            else scoreEarned = 0;
                        }
                        detail = { statements: stmtResults };
                    } 
                    
                    // --- Xá»¬ LĂ TRáº¢ Lá»œI NGáº®N (Short Answer) ---
                    else if (item.type === 'short-answer' || item.type === 'sentence-transformation') {
                         // Priority: Individual score > Group average score
                        let maxPoint = item.score > 0 ? item.score : scorePerSA;

                        if (options.shortAnswerFormat === 'form') {
                            const userParts = userAnswers[index] || {};
                            // --- UPDATED LOGIC: Concatenate parts to check full string ---
                            let userFullStr = "";
                            for(let i=0; i<4; i++) {
                                userFullStr += (userParts[i] || "").trim();
                            }
                            
                            let correctStr = (item.answer || "").trim();
                            
                            // Check using smart comparison (handles 0,25 vs 0.25 etc)
                            if (checkAnswerSmart(userFullStr, correctStr)) {
                                isCorrect = true;
                                scoreEarned = maxPoint;
                            }
                            
                            // Save detailed object for better rendering
                            detail = { 
                                type: 'form-4',
                                userParts: userParts,
                                userFullStr: userFullStr,
                                correctStr: correctStr
                            };

                        } else {
                            const userText = userAnswers[index] || '';
                            if (checkAnswerSmart(userText, item.answer)) {
                                isCorrect = true;
                                scoreEarned = maxPoint;
                            }
                            detail = { textAnswer: userText, correctAnswer: item.answer };
                        }
                    } 
                    
                    // --- Xá»¬ LĂ Tá»° LUáº¬N (Essay) ---
                    else {
                        const userText = userAnswers[index] || '';
                        
                        // XĂ¡c Ä‘á»‹nh Ä‘iá»ƒm tá»‘i Ä‘a cho cĂ¢u há»i nĂ y
                        // Æ¯u tiĂªn: Äiá»ƒm riĂªng (item.score) -> Äiá»ƒm ghi trong text -> Trung bĂ¬nh
                        let maxPointsForThisQuestion = scorePerEssayAvg;
                        if (item.score > 0) {
                             maxPointsForThisQuestion = item.score;
                        } else if (item.type === 'essay') {
                            // Fallback to text parsing if item.score is 0
                            maxPointsForThisQuestion = getQuestionMaxScore(item.question, scorePerEssayAvg);
                        }

                        // Náº¿u cĂ³ API Key vĂ  lĂ  cĂ¢u tá»± luáº­n -> DĂ¹ng AI cháº¥m
                        if (apiKeys.gemini && userText.trim()) {
                            aiGradingResult = await gradeEssayWithAI(item.question, item.answer, userText, maxPointsForThisQuestion);
                            scoreEarned = aiGradingResult.scoreEarned;
                            isCorrect = aiGradingResult.isCorrect;
                            detail = aiGradingResult.details;
                        } else {
                            // Fallback: Cháº¥m thá»§ cĂ´ng Ä‘Æ¡n giáº£n
                            if (checkAnswerSmart(userText, item.answer)) { 
                                isCorrect = true;
                                scoreEarned = maxPointsForThisQuestion;
                            }
                            detail = { textAnswer: userText, correctAnswer: item.answer, feedback: "ChÆ°a Ä‘Æ°á»£c cháº¥m bá»Ÿi AI (thiáº¿u Key hoáº·c lá»—i)." };
                        }
                    }
                } catch (err) {
                    console.error("Lá»—i khi cháº¥m Ä‘iá»ƒm cĂ¢u " + (index + 1), err);
                    detail = { error: "Lá»—i cháº¥m Ä‘iá»ƒm: " + err.message };
                }
                
                return {
                    id: item.id,
                    questionNumber: index + 1,
                    type: item.type,
                    isCorrect: isCorrect,
                    scoreEarned: scoreEarned,
                    details: detail
                };
            });
            
            // Wait for all grading (including async AI calls) to finish
            detailResults = await Promise.all(gradingPromises);
            
            // Calculate Total Score from results
            totalScore = detailResults.reduce((sum, res) => sum + res.scoreEarned, 0);
            let score = Math.min(10, Math.max(0, totalScore));

            dom.quizScreen.classList.add('hidden');
            dom.resultScreen.classList.remove('hidden');
            
            dom.scoreDisplay.textContent = score.toFixed(2);
            dom.resultName.textContent = dom.nameInput.value;
            dom.resultClass.textContent = dom.classInput.value;
            dom.resultTime.textContent = new Date().toLocaleString();

            if (googleScriptUrl) {
                const payload = {
                    timestamp: new Date().toISOString(),
                    name: dom.nameInput.value,
                    class: dom.classInput.value,
                    score: score.toFixed(2),
                    examCode: examCode,
                    monitoringLog: JSON.stringify(monitorLog),
                    answerDetails: JSON.stringify(detailResults)
                };
                
                fetch(googleScriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                }).catch(e => console.error("Lá»—i gá»­i Ä‘iá»ƒm:", e));
            }

            if (options.showAnswers) {
                dom.viewAnswersBtn.classList.remove('hidden');
                renderDetailedAnswers(detailResults);
            }
            
            if (options.aiAssessment) {
                generateAIAssessment(score, detailResults);
            }

        } catch (error) {
            console.error("Lá»—i nghiĂªm trá»ng trong quĂ¡ trĂ¬nh ná»™p bĂ i:", error);
            alert("ÄĂ£ xáº£y ra lá»—i khi ná»™p bĂ i: " + error.message + ". Vui lĂ²ng chá»¥p áº£nh mĂ n hĂ¬nh vĂ  bĂ¡o cho giĂ¡o viĂªn.");
        } finally {
            if (loadingOverlay && loadingOverlay.parentNode) {
                loadingOverlay.parentNode.removeChild(loadingOverlay);
            }
        }
    }
