    function shuffleArray(array) {

            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

        if (type.startsWith('mc-') || type === 'cloze-test' || type === 'sentence-ordering' || type === 'paragraph-sentence-ordering') {
            return 'multiple-choice';
        }
        if (type.startsWith('tf-')) {
            return 'true-false';
        }
        if (type === 'sentence-transformation') {
            return 'short-answer';
        }
        if (type === 'paragraph-writing') {
            return 'essay';
        }
        return type;

    function startQuiz() {
        const name = dom.nameInput.value.trim();
        const className = dom.classInput.value.trim();
        if (!name || !className) {
            alert('Vui lĂ²ng nháº­p Ä‘áº§y Ä‘á»§ Há» tĂªn vĂ  Lớp!');
            return;
        }
        
        // --- SHUFFLE ---
        const partMap = { 'multiple-choice': 'part1', 'true-false': 'part2', 'short-answer': 'part3', 'essay': 'part4' };
        const groups = { 'multiple-choice': [], 'true-false': [], 'short-answer': [], 'essay': [] };
        
        quizData.forEach(q => {
            const type = mapEnglishTypeToSchemaType(q.type);
            if (groups[type]) groups[type].push(q);
        });
        
        let shuffledQuizData = [];
        for (const [type, questions] of Object.entries(groups)) {
            const partKey = partMap[type];
            const setting = options.shuffleSettings[partKey];
            
            if (setting === 'both' || setting === 'questions') {
                shuffleArray(questions);
            }
            
            questions.forEach(q => {
                if ((setting === 'both' || setting === 'answers') && (type === 'multiple-choice')) {
                    if (q.rendered_options) {
                        let optionsWithIndex = q.rendered_options.map((opt, i) => ({ opt, isCorrect: (i === q.correctAnswerIndex) }));
                        optionsWithIndex = shuffleArray(optionsWithIndex);
                        q.rendered_options = optionsWithIndex.map(o => o.opt);
                        q.correctAnswerIndex = optionsWithIndex.findIndex(o => o.isCorrect);
                    }
                }
            });
            shuffledQuizData = shuffledQuizData.concat(questions);
        }
        quizData = shuffledQuizData;
        // --- END SHUFFLE ---

        // NEW: Get Student API Key if provided
        if (dom.studentApiKeyInput && dom.studentApiKeyInput.value.trim()) {
            apiKeys.gemini = dom.studentApiKeyInput.value.trim();
        }

        dom.studentNameDisplay.textContent = name;
        dom.welcomeScreen.classList.add('hidden');
        dom.quizScreen.classList.remove('hidden');
        
        renderQuestions();
        renderNav();
        updateProgress();
        
        if (options.timeLimit > 0) {
            startTimer();
        } else {
            dom.timerDisplay.textContent = "--:--";
        }
        
        // Setup intersection observer to update current question index on scroll
        setupScrollObserver();
        
        window.scrollTo(0, 0);
    }

            }
        }, 1000);

            dom.timerDisplay.classList.remove('text-indigo-600');
        }
    }

    function setupScrollObserver() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const id = entry.target.id; // q-0, q-1...
                    const idx = parseInt(id.split('-')[1]);
                    currentQuestionIndex = idx;
                    updateMobileControls();
                    updateProgress();
                }
            });
        }, { threshold: 0.5 });
        
        quizData.forEach((_, idx) => {
            const el = document.getElementById(`q-${idx}`);
            if(el) observer.observe(el);
        });
    }

    // --- LOGIC CHáº¤M ÄIá»‚M THĂ”NG MINH ---
    function normalizeMathString(str) {
        if (!str) return '';
        let s = str.toString().toLowerCase().trim();
        // Replace decimal comma
        s = s.replace(/,(\d)/g, '.$1');
        // Remove spaces
        s = s.split(' ').join('');
        // Remove basic latex symbols commonly used for grouping
        s = s.split('\\left').join(''); 
        s = s.split('\\right').join('');
        s = s.split('{').join('');
        s = s.split('}').join('');
        s = s.split('$').join('');
        // Remove *
        s = s.split('*').join('');
        s = s.split(':').join('/');
        return s;
    }

    function checkAnswerSmart(userVal, correctVal) {
        if (!correctVal) return false;
        if (!userVal) return false;

        // CĂ¡ch 1: So sĂ¡nh chĂ­nh xĂ¡c (sau khi trim)
        if (userVal.trim().toLowerCase() === correctVal.trim().toLowerCase()) return true;

        // CĂ¡ch 2: So sĂ¡nh thĂ´ng minh dáº¡ng ToĂ¡n há»c (xĂ³a khoáº£ng tráº¯ng, latex)
        const cleanUser = normalizeMathString(userVal);
        const cleanCorrect = normalizeMathString(correctVal);
        if (cleanUser === cleanCorrect && cleanUser !== '') return true;

        // CĂ¡ch 3: So sĂ¡nh sá»‘ há»c (náº¿u cáº£ 2 lĂ  sá»‘)
        const numUser = parseFloat(userVal.replace(',', '.'));
        const numCorrect = parseFloat(correctVal.replace(',', '.'));
        if (!isNaN(numUser) && !isNaN(numCorrect)) {
            // Cháº¥p nháº­n sai sá»‘ nhá»
            return Math.abs(numUser - numCorrect) < 0.0001; 
        }

        return false;
    }

    function getQuestionMaxScore(questionText, defaultScore) {
        // TĂ¬m cĂ¡c máº«u nhÆ° (2 điểm), [2Ä‘], (2.5Ä‘), [1.5 điểm] á»Ÿ Ä‘áº§u hoặc cuá»‘i cĂ¢u
        const regex = /[([]s*(d+([.,]d+)?)s*(Ä‘|điểm)s*[)]]/i;
        const match = questionText.match(regex);
        if (match) {
            return parseFloat(match[1].replace(',', '.'));
        }
        return defaultScore;
    }

                try {
                    // --- Xá»¬ LÝ TRáº®C NGHIá»†M (Multiple Choice) ---
                    if (item.type === 'multiple-choice' || item.type.startsWith('mc-')) {
                        // Priority: Individual score > Group average score
                        let maxPoint = item.score > 0 ? item.score : scorePerMC;
                        if (userAnswers[index] === item.correctAnswerIndex) {
                            isCorrect = true;
                            scoreEarned = maxPoint;
                        }
                        detail = { userAnswer: userAnswers[index], correctAnswer: item.correctAnswerIndex };
                    } 
                    
                    // --- Xá»¬ LÝ ÄĂNG/SAI (True/False) ---
                    else if (item.type === 'true-false' || item.type.startsWith('tf-')) {
                        let correctStmtCount = 0;
                        let stmtResults = [];
                        // Priority: Individual score > Group average score
                        let maxPoint = item.score > 0 ? item.score : scorePerTF;

                        item.statements.forEach((stmt, i) => {
                            const userVal = userAnswers[index] ? userAnswers[index][i] : null;
                            const stmtCorrect = (String(userVal) === String(stmt.is_correct)); 
                            if (stmtCorrect) correctStmtCount++;
                            stmtResults.push({ statement: i, user: userVal, correct: stmt.is_correct, isCorrect: stmtCorrect });
                        });

                        if (options.pointsTFMethod === 'even') {
                            scoreEarned = (correctStmtCount / 4) * maxPoint;
                            if (correctStmtCount === 4) isCorrect = true;
                        } else {
                            if (correctStmtCount === 1) scoreEarned = maxPoint * 0.1;
                            else if (correctStmtCount === 2) scoreEarned = maxPoint * 0.25;
                            else if (correctStmtCount === 3) scoreEarned = maxPoint * 0.5;
                            else if (correctStmtCount === 4) { scoreEarned = maxPoint; isCorrect = true; }
                            else scoreEarned = 0;
                        }
                        detail = { statements: stmtResults };
                    } 
                    
                    // --- Xá»¬ LÝ TRáº¢ Lá»œI NGáº®N (Short Answer) ---
                    else if (item.type === 'short-answer' || item.type === 'sentence-transformation') {
                         // Priority: Individual score > Group average score
                        let maxPoint = item.score > 0 ? item.score : scorePerSA;

                        if (options.shortAnswerFormat === 'form') {
                            const userParts = userAnswers[index] || {};
                            // --- UPDATED LOGIC: Concatenate parts to check full string ---
                            let userFullStr = "";
                            for(let i=0; i<4; i++) {
                                userFullStr += (userParts[i] || "").trim();
                            }
                            
                            let correctStr = (item.answer || "").trim();
                            
                            // Check using smart comparison (handles 0,25 vs 0.25 etc)
                            if (checkAnswerSmart(userFullStr, correctStr)) {
                                isCorrect = true;
                                scoreEarned = maxPoint;
                            }
                            
                            // Save detailed object for better rendering
                            detail = { 
                                type: 'form-4',
                                userParts: userParts,
                                userFullStr: userFullStr,
                                correctStr: correctStr
                            };

                        } else {
                            const userText = userAnswers[index] || '';
                            if (checkAnswerSmart(userText, item.answer)) {
                                isCorrect = true;
                                scoreEarned = maxPoint;
                            }
                            detail = { textAnswer: userText, correctAnswer: item.answer };
                        }
                    } 
                    
                    // --- Xá»¬ LÝ Tá»° LUáº¬N (Essay) ---
                    else {
                        const userText = userAnswers[index] || '';
                        
                        // XĂ¡c Ä‘á»‹nh điểm tá»‘i Ä‘a cho câu hỏi nĂ y
                        // Æ¯u tiĂªn: Äiá»ƒm riĂªng (item.score) -> Äiá»ƒm ghi trong text -> Trung bĂ¬nh
                        let maxPointsForThisQuestion = scorePerEssayAvg;
                        if (item.score > 0) {
                             maxPointsForThisQuestion = item.score;
                        } else if (item.type === 'essay') {
                            // Fallback to text parsing if item.score is 0
                            maxPointsForThisQuestion = getQuestionMaxScore(item.question, scorePerEssayAvg);
                        }

                        // Náº¿u cĂ³ API Key vĂ  lĂ  cĂ¢u tá»± luáº­n -> DĂ¹ng AI cháº¥m
                        if (apiKeys.gemini && userText.trim()) {
                            aiGradingResult = await gradeEssayWithAI(item.question, item.answer, userText, maxPointsForThisQuestion);
                            scoreEarned = aiGradingResult.scoreEarned;
                            isCorrect = aiGradingResult.isCorrect;
                            detail = aiGradingResult.details;
                        } else {
                            // Fallback: Cháº¥m thá»§ cĂ´ng Ä‘Æ¡n giáº£n
                            if (checkAnswerSmart(userText, item.answer)) { 
                                isCorrect = true;
                                scoreEarned = maxPointsForThisQuestion;
                            }
                            detail = { textAnswer: userText, correctAnswer: item.answer, feedback: "ChÆ°a Ä‘Æ°á»£c cháº¥m bá»Ÿi AI (thiáº¿u Key hoặc lá»—i)." };
                        }
                    }
                } catch (err) {
                    console.error("Lá»—i khi cháº¥m điểm cĂ¢u " + (index + 1), err);
                    detail = { error: "Lá»—i cháº¥m điểm: " + err.message };
                }
                
                return {
                    id: item.id,
                    questionNumber: index + 1,
                    type: item.type,
                    isCorrect: isCorrect,
                    scoreEarned: scoreEarned,
                    details: detail
                };
            });
            
            // Wait for all grading (including async AI calls) to finish
            detailResults = await Promise.all(gradingPromises);
            
            // Calculate Total Score from results
            totalScore = detailResults.reduce((sum, res) => sum + res.scoreEarned, 0);
            let score = Math.min(10, Math.max(0, totalScore));

            dom.quizScreen.classList.add('hidden');
            dom.resultScreen.classList.remove('hidden');
            
            dom.scoreDisplay.textContent = score.toFixed(2);
            dom.resultName.textContent = dom.nameInput.value;
            dom.resultClass.textContent = dom.classInput.value;
            dom.resultTime.textContent = new Date().toLocaleString();

            if (googleScriptUrl) {
                const payload = {
                    timestamp: new Date().toISOString(),
                    name: dom.nameInput.value,
                    class: dom.classInput.value,
                    score: score.toFixed(2),
                    examCode: examCode,
                    monitoringLog: JSON.stringify(monitorLog),
                    answerDetails: JSON.stringify(detailResults)
                };
                
                fetch(googleScriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                }).catch(e => console.error("Lá»—i gá»­i điểm:", e));
            }

            if (options.showAnswers) {
                dom.viewAnswersBtn.classList.remove('hidden');
                renderDetailedAnswers(detailResults);
            }
            
            if (options.aiAssessment) {
                generateAIAssessment(score, detailResults);
            }

        } catch (error) {
            console.error("Lá»—i nghiĂªm trá»ng trong quĂ¡ trĂ¬nh ná»™p bĂ i:", error);
            alert("Đã xảy ra lỗi khi nộp bài: " + error.message + ". Vui lòng chụp ảnh màn hình và báo cho giáo viên.");
        } finally {
            if (loadingOverlay && loadingOverlay.parentNode) {
                loadingOverlay.parentNode.removeChild(loadingOverlay);
            }
        }
    }

    function renderDetailedAnswers(results) {

        quizData.forEach((item, index) => {

            const color = isCorrect ? 'text-green-600' : 'text-red-600';

                    ${options.showExplanation ? `

                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
                           <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                        </svg>
                        Giải thích chi tiết
                    </button>`: ''}
                </div>
                <div class="mb-2 text-gray-800">${item.rendered_question || item.question}</div>`;

            if (item.type === 'multiple-choice') {
                const userIdx = userAnswers[index];
                const correctIdx = item.correctAnswerIndex;
                html += `<div class="text-sm">
                    <p>Bạn chọn: <span class="font-semibold">${userIdx !== undefined ? String.fromCharCode(65+userIdx) : 'Không trả lời'}</span></p>
                    <p class="font-bold text-green-700">Đáp án đúng: ${String.fromCharCode(65+correctIdx)}. ${item.options[correctIdx]}</p>
                </div>`;
            } else if (item.type === 'true-false') {
                 html += '<ul class="list-disc pl-5 text-sm">';
                 item.statements.forEach((s, i) => {
                     const userVal = userAnswers[index] ? userAnswers[index][i] : null;
                     const isStmtCorrect = userVal === s.is_correct;
                     html += `<li class="${isStmtCorrect ? 'text-green-700' : 'text-red-700'}">
                        Ý ${String.fromCharCode(97+i)}: ${s.statement} (Đáp án: ${s.is_correct ? 'Đúng' : 'Sai'} - Bạn chọn: ${userVal === null ? 'Trống' : (userVal ? 'Đúng' : 'Sai')})
                     </li>`;
                 });
                 html += '</ul>';
            } else if (item.type === 'short-answer' && options.shortAnswerFormat === 'form') {
                 // --- HIá»‚N THá» Káº¾T QUáº¢ Dáº NG FORM 4 Ă” (Cáº¬P NHáº¬T) ---
                 const userParts = userAnswers[index] || {};
                 
                 html += '<div class="grid grid-cols-2 sm:grid-cols-4 gap-2 mt-3">';
                 for(let i=0; i<4; i++) {
                     const uVal = userParts[i] || '';
                     // Style cho tá»«ng Ă´ - Náº¿u cĂ¢u đúng thĂ¬ xanh, sai thĂ¬ Ä‘á»
                     const boxClass = isCorrect ? 'bg-green-50 border-green-300 text-green-800' : 'bg-red-50 border-red-300 text-red-800';

                     html += `
                     <div class="p-2 border rounded-lg ${boxClass} flex flex-col items-center justify-center">
                        <span class="text-[10px] font-bold uppercase text-gray-500">Ă” ${i+1}</span>
                        <span class="text-xl font-mono font-bold">${uVal || '_'}</span>
                     </div>`;
                 }
                 html += '</div>';
                 
                 if (!isCorrect) {
                     html += `<div class="mt-2 text-sm">
                        <span class="font-bold text-green-700">Đáp án đúng: ${item.answer}</span>
                     </div>`;
                 }

            } else if (item.type === 'essay') {
                 // Sá»­ dá»¥ng $$ Ä‘á»ƒ MathJax render kết quả tráº£ vá» náº¿u Ä‘Ă³ lĂ  cĂ´ng thá»©c toĂ¡n
                 // NhÆ°ng cáº§n cáº©n tháº­n vĂ¬ userAnswers lĂ  string thĂ´. 
                 // Tốt nháº¥t lĂ  bá»c trong 1 div vĂ  Ä‘á»ƒ MathJax xá»­ lĂ½
                 html += `<div class="text-sm"><p class="font-semibold">Bạn trả lời:</p><div class="bg-white p-2 border rounded whitespace-pre-wrap">${userAnswers[index] || '(Trống)'}</div></div>`;
                 
                 if (result.details && result.details.aiGraded) {
                     html += `
                        <div class="mt-3 p-3 bg-indigo-50 rounded border border-indigo-200">
                            <h4 class="font-bold text-indigo-700 mb-1">đŸ¤– AI Cháº¥m điểm:</h4>
                            <div class="text-sm mb-2">
                                <strong>Thang điểm & Đáp án chi tiáº¿t:</strong><br>
                                ${result.details.aiRubric.replace(/\n/g, '<br>')}
                            </div>
                             <div class="mt-2 font-bold text-red-600 border-t pt-2 border-indigo-200">Điểm chấm: ${result.scoreEarned}</div>
                        </div>
                     `;
                 } else if (item.answer) {
                      html += `<div class="text-sm mt-2 font-semibold text-green-700">Đáp án gá»‘c (Gá»£i Ă½ cá»§a GV): ${item.answer}</div>`;
                 }
            } else {
                 html += `<div class="text-sm"><p>Bạn trả lời:</p><div class="bg-white p-2 border rounded">${userAnswers[index] || '(Trống)'}</div></div>`;
                 if (item.answer) {
                      html += `<div class="text-sm mt-1 font-semibold text-green-700">Đáp án gá»‘c: ${item.answer}</div>`;
                 }
            }
            
            html += `<div id="ai-explanation-${index}" class="hidden mt-3 p-3 bg-blue-50 text-sm text-blue-800 rounded border border-blue-200">
                <div class="font-bold mb-1">AI giải thích thêm:</div>
                <div class="ai-content">Đang táº£i...</div>
            </div>`;
            
            if (options.showExplanation && (item.rendered_answer || item.answer) && item.type !== 'essay') {
                 html += `<div class="mt-3 pt-2 border-t border-gray-200 text-sm text-gray-600">
                    <strong>Giáº£i thĂ­ch/Đáp án chi tiáº¿t (CĂ³ sáºµn):</strong><br>
                    ${item.rendered_answer || item.answer || ""}
                 </div>`;
            }

            html += `</div>`;
        });
        
        dom.detailedAnswers.innerHTML = html;
        if (window.MathJax) window.MathJax.typesetPromise();

        document.querySelectorAll('.ai-explain-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(e.target.closest('button').dataset.index);
                explainQuestionWithAI(idx, results[idx]);
            });
        });
    }
    
    dom.viewAnswersBtn.addEventListener('click', () => {
        dom.detailedAnswers.classList.remove('hidden');
        dom.viewAnswersBtn.classList.add('hidden');
    });

    async function explainQuestionWithAI(index, resultItem) {
        if (!apiKeys.gemini) {
            const key = prompt("TĂ­nh nÄƒng nĂ y yĂªu cáº§u Gemini API Key.\nVui lĂ²ng nháº­p API Key cá»§a báº¡n:");
            if (key && key.trim()) {
                apiKeys.gemini = key.trim();
            } else {
                return alert("Báº¡n cáº§n nháº­p API Key Ä‘á»ƒ xem giáº£i thĂ­ch tá»« AI.");
            }
        }
        
        const explanationDiv = document.getElementById(`ai-explanation-${index}`);
        const contentDiv = explanationDiv.querySelector('.ai-content');
        
        if (!explanationDiv.classList.contains('hidden') && contentDiv.innerHTML !== 'Đang táº£i...') {
             explanationDiv.classList.add('hidden'); 
             return;
        }

        explanationDiv.classList.remove('hidden');
        contentDiv.textContent = "Đang phĂ¢n tĂ­ch câu hỏi...";

        const item = quizData[index];
        let prompt = "HĂ£y Ä‘Ă³ng vai má»™t giĂ¡o viĂªn giá»i, giáº£i thĂ­ch chi tiáº¿t câu hỏi sau cho há»c sinh:\n";
        prompt += `Câu há»i: ${item.question || item.main_question}\n`;
        
        if (item.type === 'multiple-choice') {
            prompt += `CĂ¡c lá»±a chá»n: ${item.options.join(', ')}\n`;
            prompt += `Đáp án đúng lĂ : ${item.options[item.correctAnswerIndex]}\n`;
            if (userAnswers[index] !== undefined) {
                prompt += `Há»c sinh chá»n: ${item.options[userAnswers[index]]} (ÄĂ¢y lĂ  Ä‘Ă¡p Ă¡n ${resultItem.isCorrect ? 'đúng' : 'sai'}).\n`;
            }
        } else if (item.type === 'true-false') {
             prompt += `CĂ¡c má»‡nh Ä‘á»:\n`;
             item.statements.forEach((s, i) => {
                 prompt += `${String.fromCharCode(97+i)}) ${s.statement} -> Đáp án: ${s.is_correct ? 'Đúng' : 'Sai'}\n`;
             });
        }
        
        prompt += "\nHĂ£y giáº£i thĂ­ch táº¡i sao Ä‘Ă¡p Ă¡n đúng láº¡i đúng. Ngáº¯n gá»n, dá»… hiá»ƒu.";

        try {
            const ai = new GoogleGenAI({ apiKey: apiKeys.gemini });
            const response = await ai.models.generateContent({
                model: "gemini-2.5-flash",
                contents: prompt
            });
            
            const text = response.text;
            let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            contentDiv.innerHTML = formattedText.replace(/\n/g, '<br>');

            if (window.MathJax) window.MathJax.typesetPromise([contentDiv]);
        } catch (e) {
            contentDiv.textContent = "Lá»—i khi gá»i AI: " + e.message;
        }
    }

    async function generateAIAssessment(score, results) {
        if (!apiKeys.gemini) {
             dom.aiAssessmentContainer.classList.remove('hidden');
             dom.aiAssessmentContent.innerHTML = `
                <div class="mb-2">
                    <div class="flex justify-between items-center mb-1">
                         <p class="text-red-600 font-medium">Cáº§n cĂ³ API Key Ä‘á»ƒ xem nháº­n xĂ©t.</p>
                         <a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-xs text-red-600 hover:text-red-800 font-bold hover:underline">Link lấy API KEY miễn phí­</a>
                    </div>
                    <div class="flex gap-2">
                        <input type="password" id="result-api-key" class="border p-2 rounded text-sm w-full outline-none focus:border-indigo-500" placeholder="Nháº­p Gemini API Key">
                        <button id="submit-result-key" class="bg-indigo-600 text-white px-4 py-2 rounded text-sm font-semibold hover:bg-indigo-700 transition">Gá»­i</button>
                    </div>
                </div>
             `;
             document.getElementById('submit-result-key').addEventListener('click', () => {
                const key = document.getElementById('result-api-key').value.trim();
                if(key) {

                    generateAIAssessment(score, results);
                }
             });
             return;
        }

        dom.aiAssessmentContainer.classList.remove('hidden');
        dom.aiAssessmentContent.textContent = "AI Ä‘ang phĂ¢n tĂ­ch bĂ i lĂ m cá»§a báº¡n...";
        
        let summary = `Äiá»ƒm sá»‘: ${score}/10.\n`;
        const wrongAnswers = results.filter(r => r.isCorrect === false);
        const correctAnswers = results.filter(r => r.isCorrect === true);
        
        summary += `Sá»‘ cĂ¢u đúng: ${correctAnswers.length}/${results.length}.\n`;
        summary += `CĂ¡c cĂ¢u lĂ m sai: ${wrongAnswers.map(w => w.questionNumber).join(', ')}.\n`;
        
        const prompt = `HĂ£y Ä‘Ă³ng vai má»™t giĂ¡o viĂªn tĂ¢m lĂ½. Dá»±a vĂ o kết quả bĂ i kiá»ƒm tra dÆ°á»›i Ä‘Ă¢y, hĂ£y viáº¿t má»™t Ä‘oáº¡n nháº­n xĂ©t ngáº¯n gá»n (khoáº£ng 100 tá»«) Ä‘á»™ng viĂªn vĂ  Ä‘Æ°a ra lá»i khuyĂªn há»c táº­p chung.
        
        ThĂ´ng tin kết quả:
        ${summary}`;

        try {
            const ai = new GoogleGenAI({ apiKey: apiKeys.gemini });
            const response = await ai.models.generateContent({
                model: "gemini-2.5-flash",
                contents: prompt
            });
            const text = response.text;
            let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            dom.aiAssessmentContent.innerHTML = formattedText.replace(/\n/g, '<br>');
            
        } catch (e) {
            console.error("AI Error:", e);
            dom.aiAssessmentContent.textContent = "KhĂ´ng thá»ƒ táº£i nháº­n xĂ©t tá»« AI lĂºc nĂ y.";
        }
    }
